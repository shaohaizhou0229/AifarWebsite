<!doctype html>
<html lang="en">
  <head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Contact | Aifar</title><meta name="description" content="Contact Aifar for government and enterprise collaboration product inquiries, technical support, and partnership discussions."><link rel="canonical" href="https://www.aifar.com/contact/"><link rel="stylesheet" href="/assets/styles/main.css"></head>
  <body>
    <header class="site-header"><div class="nav-wrap"><a class="brand" href="/"><span class="brand-mark">A</span><span>Aifar</span></a><button class="menu-toggle" type="button" aria-label="Open navigation" aria-expanded="false" data-menu-toggle><span></span></button><nav class="nav-links" data-nav><a href="/product/">Product</a><a href="/downloads/">Downloads</a><a href="/whats-new/">What's New</a><a href="/docs/">Docs</a><a href="/support/">Support</a><a href="/contact/">Contact</a></nav></div></header>
    <main>
      <section class="page-hero"><div class="section-inner"><p class="eyebrow">Contact</p><h1>Talk with the Aifar team.</h1><p class="lead">Use this placeholder form for the first website version. Later it can submit directly into Aifar Forms, Workflow, Contact, and Email.</p></div></section>
      <section class="section alt"><div class="section-inner"><form class="form-shell">
        <div class="field"><label for="name">Name</label><input id="name" name="name" autocomplete="name"></div>
        <div class="field"><label for="email">Work email</label><input id="email" name="email" type="email" autocomplete="email"></div>
        <div class="field"><label for="organization">Organization</label><input id="organization" name="organization" autocomplete="organization"></div>
        <div class="field"><label for="request-type">Request type</label><select id="request-type" name="request-type"><option>Product inquiry</option><option>Technical support</option><option>Partnership</option><option>Other</option></select></div>
        <div class="field"><label for="message">Message</label><textarea id="message" name="message"></textarea></div>
        <button class="button primary" type="button">Submit request</button>
      </form></div></section>
    </main>
